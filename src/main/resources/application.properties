# 服务端口
server.port=8080

# 强制响应编码为 UTF-8（解决中文乱码）
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# === 千问配置（兼容 OpenAI 接口） ===
# 千问的 OpenAI 兼容地址
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode
# 你的千问 API Key，替换成你自己的
spring.ai.openai.api-key=sk-5f4497334c1d47c69c37c864eaaf64c3
# 使用的模型
spring.ai.openai.chat.options.model=qwen-plus

# Embedding 模型配置（RAG 用，千问的向量化模型）
spring.ai.openai.embedding.options.model=text-embedding-v3

# === 数据库配置 ===
# 默认使用 MySQL，启动时加 --spring.profiles.active=h2 可切换到 H2
# 例如：java -jar app.jar --spring.profiles.active=h2
spring.datasource.url=jdbc:mysql://localhost:3306/fa_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 启动时自动执行建表脚本
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
