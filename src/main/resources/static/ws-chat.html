<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服 - WebSocket 实时对话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .chat-container { width: 440px; height: 700px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
        .chat-header .avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .chat-header .info h3 { font-size: 15px; }
        .chat-header .info p { font-size: 12px; opacity: 0.8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; }
        .status-dot.connected { background: #27ae60; box-shadow: 0 0 6px #27ae60; }
        .status-dot.disconnected { background: #e74c3c; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .message.bot { align-self: flex-start; background: #f1f3f5; color: #333; border-bottom-left-radius: 4px; }
        .message.user { align-self: flex-end; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; border-bottom-right-radius: 4px; }
        .message .tag { display: inline-block; font-size: 11px; background: #e8f8e8; color: #11998e; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; }
        .chat-input { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
        .chat-input input:focus { border-color: #11998e; }
        .chat-input button { padding: 10px 18px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        .typing-indicator { font-size: 12px; color: #999; padding: 4px 16px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div class="info">
                <h3>智能客服 小智 (WebSocket)</h3>
                <p id="status-text">连接中...</p>
            </div>
            <div class="status-dot disconnected" id="status-dot"></div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot">你好！我是智能客服小智（WebSocket 实时模式），有什么可以帮您？</div>
        </div>
        <div class="typing-indicator" id="typing" style="display:none">小智正在输入...</div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

<script>
const sessionId = 'ws_' + Date.now();
let ws = null;
let currentBotMsg = null;

function connect() {
    ws = new WebSocket('ws://' + window.location.host + '/ws/chat');

    ws.onopen = () => {
        document.getElementById('status-dot').className = 'status-dot connected';
        document.getElementById('status-text').textContent = '在线 · 实时连接';
    };

    ws.onclose = () => {
        document.getElementById('status-dot').className = 'status-dot disconnected';
        document.getElementById('status-text').textContent = '已断开，3秒后重连...';
        setTimeout(connect, 3000);
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'token') {
            document.getElementById('typing').style.display = 'block';
            if (!currentBotMsg) {
                currentBotMsg = addMessage('', 'bot');
            }
            currentBotMsg.textContent += data.content;
            scrollBottom();
        } else if (data.type === 'done') {
            document.getElementById('typing').style.display = 'none';
            if (currentBotMsg && data.intent) {
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.textContent = (data.cached ? '⚡ 缓存' : '🤖 ') + data.intent;
                currentBotMsg.prepend(tag);
            }
            currentBotMsg = null;
            document.getElementById('sendBtn').disabled = false;
        } else if (data.type === 'error') {
            document.getElementById('typing').style.display = 'none';
            addMessage('出错了：' + data.content, 'bot');
            currentBotMsg = null;
            document.getElementById('sendBtn').disabled = false;
        }
    };
}

function send() {
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage(message, 'user');
    input.value = '';
    document.getElementById('sendBtn').disabled = true;

    ws.send(JSON.stringify({ message, sessionId, tenantId: 'default' }));
}

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
    return div;
}

function scrollBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
}

connect();
</script>
</body>
</html>
